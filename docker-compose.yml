services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://budget:budget@db:5432/budget
      # RBAC: Keycloak連携時はここにJWKS URLを設定
      # KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/pjmo/protocol/openid-connect/certs
      # AI自動レビュー（Ollama）
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5
      # Webhook通知先（Slack/Teams/カスタム）
      # WEBHOOK_URL: https://hooks.slack.com/services/xxx
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3005:3005"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # Keycloak RBAC（オプション）
  # keycloak:
  #   image: quay.io/keycloak/keycloak:24.0
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: admin
  #   command: start-dev
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
  ollama_data:
